# Golden Dataset — Pipeline Configuration
# =========================================

paths:
  models_dir: models
  real_audio_dir: data/real
  fake_audio_dir: data/fake
  rvc_engine: rvc_engine

# Default RVC inference parameters (can be overridden per-model)
rvc_defaults:
  f0_method: rmvpe
  index_rate: 0.75
  protect: 0.33
  volume_envelope: 0.25
  hop_length: 128
  pitch: 0
  export_format: WAV

# List specific model folder names to process, or leave empty [] to
# auto-discover ALL folders inside models_dir that contain a .pth + .index.
active_models: []

# ElevenLabs speech-to-speech configuration
# Run with: python main.py --method elevenlabs
# Requires: ELEVENLABS_API_KEY environment variable
elevenlabs:
  model_id: eleven_multilingual_sts_v2
  output_format: pcm_16000
  voices:
    - name: pt_voice_1
      voice_id: RGymW84CSmfVugnA5tvA
    - name: pt_voice_2
      voice_id: 4J31DrhygVjvFsoj7BsM
    - name: pt_voice_3
      voice_id: 3Je7qW9yPOhc47iG41pH
